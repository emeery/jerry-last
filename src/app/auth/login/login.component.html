<div [ngClass]="(currentTheme$ | async)">
  @if ((currentTheme$ | async) === 'dark-theme') {
  <mat-toolbar [ngClass]="(currentTheme$ | async)">
    <mat-toolbar-row>
      <mat-icon class="icon-display">bubble_chart</mat-icon>
      <span class="example-spacer"></span>
      <button id="moon" (click)="toggleTheme()"> <img
          src="https://raw.githubusercontent.com/talohana/angular-dark-mode/master/src/assets/moon.svg" /></button>
    </mat-toolbar-row>
  </mat-toolbar>
  } @else {
  <mat-toolbar class="toolbar-light">
    <mat-toolbar-row>
      <span class="example-spacer"></span>
      <img class="theme" (click)="toggleTheme()"
        src="https://raw.githubusercontent.com/talohana/angular-dark-mode/master/src/assets/sun.svg" />
    </mat-toolbar-row>
  </mat-toolbar>
  }

  <div class="login-box">
    <form [formGroup]="form" (submit)="onSubmit()">
      <mat-card class="custom-card"  [ngClass]="(currentTheme$ | async)">
        @if (isLoading$ | async) {
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
        } @else {
        <mat-form-field appearance="fill" class="fld">
          <input formControlName="email" matInput placeholder="Correo" class="inp">
          <mat-icon matPrefix class="my-icon">alternate_email</mat-icon>
        </mat-form-field>
        @if ((currentTheme$ | async) === 'dark-theme') {
          <button class="custom-button" mat-flat-button type="submit" [disabled]="form.invalid">Ingresar</button>
        } @else {
          <button class="custom-button-light" mat-flat-button type="submit" [disabled]="form.invalid">Ingresar</button>
        }
        
        }
      </mat-card>
    </form>
  </div>
</div>
